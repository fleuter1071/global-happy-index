<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('map-wrapper');
    const ticker = document.getElementById('ticker');
    const gaugePointer = document.getElementById('gauge-pointer');
    const gaugeText = document.getElementById('gauge-text');
    const loading = document.getElementById('loading');
    const connStatus = document.getElementById('conn-status');
    const panelTitle = document.getElementById('panel-title');
    const terminal = document.getElementById('terminal');

    let w, h;
    let particles = [];

    function resize() {
        w = canvas.width = wrapper.offsetWidth;
        h = canvas.height = wrapper.offsetHeight;
    }
    window.addEventListener('resize', resize);

    function log(msg, type="info") {
        const div = document.createElement('div');
        div.className = `log-${type}`;
        div.innerText = `> ${msg}`;
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight;
    }

    // --- THE FIX: STRICT GDELT URL FORMATTING ---
    async function fetchGdeltData() {
        // Added &mode=PointData and capitalized format=GeoJSON to prevent HTTP 400 Bad Request
        const targetUrl = "https://api.gdeltproject.org/api/v2/geo/geo?query=tone%3C-5&mode=PointData&format=GeoJSON&timespan=24h";
        const encoded = encodeURIComponent(targetUrl);
        
        const routes = [
            { name: "AllOrigins Proxy", url: `https://api.allorigins.win/get?url=${encoded}` },
            { name: "CodeTabs Proxy", url: `https://api.codetabs.com/v1/proxy?quest=${targetUrl}` },
            { name: "CorsProxy.io", url: `https://corsproxy.io/?${encoded}` },
            { name: "Direct GDELT API", url: targetUrl }
        ];

        for (let route of routes) {
            try {
                log(`Attempting: ${route.name}`, "info");
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000); 
                
                const res = await fetch(route.url, { 
                    cache: "no-store",
                    signal: controller.signal 
                });
                
                clearTimeout(timeoutId);

                if (!res.ok) {
                    log(`Failed: HTTP ${res.status}`, "error");
                    continue; 
                }

                let data;
                if (route.name === "AllOrigins Proxy") {
                    const proxyData = await res.json();
                    if (!proxyData.contents) throw new Error("Proxy returned empty contents");
                    data = JSON.parse(proxyData.contents);
                } else {
                    data = await res.json();
                }

                if (data && data.features && data.features.length > 0) {
                    log(`Connection Established! Fetched ${data.features.length} points.`, "success");
                    return data;
                } else {
                    log(`Warning: Zero features returned`, "error");
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    log(`Error: Server Timeout`, "error");
                } else {
                    log(`Error: ${e.message}`, "error");
                }
            }
        }
        throw new Error("All routes exhausted.");
    }

    async function init() {
        resize();
        log("System initialized. Starting network sequence...", "info");
        try {
            const data = await fetchGdeltData();
            
            setTimeout(() => { loading.style.display = 'none'; }, 500);
            connStatus.innerText = "● SECURE UPLINK ESTABLISHED";
            connStatus.style.color = "#00ff00";
            panelTitle.innerText = "LIVE EVENT STREAM";
            processData(data.features, false);
            
        } catch (e) {
            log("FATAL: Cannot reach data source.", "error");
            log("Activating Simulation Engine.", "info");
            
            setTimeout(() => { loading.style.display = 'none'; }, 1000);
            connStatus.innerText = "⚠ OFFLINE - SIMULATION ACTIVE";
            connStatus.style.color = "#ffaa00";
            panelTitle.innerText = "SIMULATED EVENT STREAM";
            processData(null, true);
        }
    }

    function processData(features, isSim) {
        let count = isSim ? 500 : features.length;
        
        // Critical Threshold adjusted for 24 hours of global news
        let percent = Math.min((count / 2000) * 100, 100);
        gaugePointer.style.left = percent + "%";

        if (percent < 30) {
            gaugeText.innerText = "LOW / STABLE";
            gaugeText.style.color = "#00ff00";
        } else if (percent < 70) {
            gaugeText.innerText = "ELEVATED ALERT";
            gaugeText.style.color = "#ffff00";
        } else {
            gaugeText.innerText = "HIGH / CRITICAL";
            gaugeText.style.color = "#ff3300";
        }

        particles = [];
        if(isSim) {
            startSimulation();
        } else {
            features.forEach(f => {
                const [lon, lat] = f.geometry.coordinates;
                // GDELT frequently places "unknown" locations at 0,0 - we filter those out
                if (lat !== 0 && lon !== 0) { 
                    createDot(lat, lon, f.properties.name);
                }
            });
            startTicker(features);
        }
        animate();
    }

    function createDot(lat, lon, name) {
        const x = (lon + 180) * (w / 360);
        const y = ((-lat + 90) * (h / 180));

        particles.push({
            x, y,
            radius: 2, 
            glowSize: Math.random() * 10 + 6, 
            phase: Math.random() * Math.PI * 2,
            speed: Math.random() * 0.05 + 0.03,
            name: name
        });
    }

    function startSimulation() {
        for(let i=0; i<150; i++) {
            const lat = (Math.random()*140)-70;
            const lon = (Math.random()*360)-180;
            createDot(lat, lon, "Simulated Alert");
        }
        setInterval(() => {
            addTickerItem("System Test", "Simulation Active");
        }, 1500);
    }

    function animate() {
        ctx.clearRect(0, 0, w, h);
        
        particles.forEach(p => {
            p.phase += p.speed;
            
            const sine = (Math.sin(p.phase) + 1) / 2;
            const alpha = 0.4 + (sine * 0.6); 
            
            ctx.globalCompositeOperation = 'lighter'; 
            const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.glowSize);
            g.addColorStop(0, `rgba(255, 50, 0, ${alpha})`); 
            g.addColorStop(1, `rgba(255, 0, 0, 0)`);
            
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.glowSize, 0, Math.PI * 2);
            ctx.fill();

            ctx.globalCompositeOperation = 'source-over'; 
            ctx.fillStyle = '#FFFFFF'; 
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
        });

        requestAnimationFrame(animate);
    }

    function startTicker(data) {
        let i = 0;
        setInterval(() => {
            if(!data.length) return;
            const item = data[i % data.length];
            if (item.properties && item.properties.name) {
                addTickerItem(item.properties.name, "Negative Sentiment");
            }
            i++;
        }, 1000);
    }

    function addTickerItem(loc, text) {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<span>>></span> <strong>${loc}</strong><br><span style="color:#888; font-weight:normal; font-size:0.7rem;">${text}</span>`;
        ticker.prepend(div);
        if(ticker.children.length > 5) ticker.lastChild.remove();
    }

    setTimeout(init, 500);

</script>
